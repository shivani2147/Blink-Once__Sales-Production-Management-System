{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <div class="form-container">
        <div class="card">
            <div class="card-header">
                <h2>On-Production Details</h2>
            </div>
            
            <form method="post" action="{% if record %}/on-production/{{ record.id }}/edit{% else %}/on-production/add{% endif %}" class="form">
                <!-- Basic Information -->
                <fieldset class="form-section">
                    <legend>Event Information</legend>
                    
                    <div class="form-group">
                        <label for="couple_name">Couple Name *</label>
                        <input type="text" id="couple_name" name="couple_name" required value="{{ record.couple_name if record else '' }}" class="form-input">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="event_date">Event Date *</label>
                            <div class="event-date-container">
                                <div class="date-input-group">
                                    <input type="date" id="event_date" class="form-input event_date_input" required value="{{ record.event_date if record else '' }}">
                                </div>
                                <button type="button" class="btn btn-sm btn-primary small-action-button add-event-date-btn">+ Add Another Date</button>
                                <input type="hidden" name="event_date" class="event_date_hidden">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone_number">Phone Number *</label>
                            <input type="tel" id="phone_number" name="phone_number" required value="{{ record.phone_number if record else '' }}" class="form-input">
                        </div>
                    </div>
                </fieldset>
                
                <!-- Status Tracking -->
                <fieldset class="form-section">
                    <legend>On-Production Checklist</legend>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="client_review" {% if record and record.client_review %}checked{% endif %}>
                            <span>Client Review Completed</span>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="payment_received" {% if record and record.payment_received %}checked{% endif %}>
                            <span>Payment Received</span>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="bts_shoot" {% if record and record.bts_shoot %}checked{% endif %}>
                            <span>BTS (Behind The Scenes) Shoot</span>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="hospitality_gesture" {% if record and record.hospitality_gesture %}checked{% endif %}>
                            <span>Hospitality Gesture</span>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="story_designing_sheet_refer" {% if record and record.story_designing_sheet_refer %}checked{% endif %}>
                            <span>Story Designing Sheet Referred</span>
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="checklist_shared_with_team" {% if record and record.checklist_shared_with_team %}checked{% endif %}>
                            <span>Checklist Shared with Team</span>
                        </label>
                    </div>
                </fieldset>
                
                <!-- Team Coordination -->
                <fieldset class="form-section">
                    <legend>Team Coordination</legend>
                    
                    <div class="form-group">
                        <label for="assigned_team_members">Assigned Team Members</label>
                        <input type="text" id="assigned_team_members" name="assigned_team_members" placeholder="e.g., John, Sarah, Mike" value="{{ record.assigned_team_members if record else '' }}" class="form-input">
                    </div>
                    
                    <div class="form-group">
                        <label for="team_feedback">Team Feedback</label>
                        <textarea id="team_feedback" name="team_feedback" class="form-textarea" placeholder="Add team feedback and notes...">{{ record.team_feedback if record else '' }}</textarea>
                    </div>
                </fieldset>
                
                <!-- Notes -->
                <fieldset class="form-section">
                    <legend>Additional Notes</legend>
                    
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" name="notes" class="form-textarea" placeholder="Add any additional notes...">{{ record.notes if record else '' }}</textarea>
                    </div>
                </fieldset>
                
                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">{% if record %}Update Record{% else %}Create Record{% endif %}</button>
                    <a href="/on-production" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

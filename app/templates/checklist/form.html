{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <div class="form-container">
        <div class="card">
            <div class="card-header">
                <h2>Checklist Details</h2>
            </div>
            
            <form method="post" action="{% if record %}/checklist/{{ record.id }}/edit{% else %}/checklist/add{% endif %}" class="form">
                <!-- Equipment Checklist -->
                <fieldset class="form-section">
                    <legend>Equipment</legend>
                    
                    <div class="form-group">
                        <label for="equipment_notes">Equipment Notes</label>
                        <textarea id="equipment_notes" name="equipment_notes" class="form-textarea form-textarea-small" placeholder="Add equipment details, issues, or special notes...">{{ record.equipment_notes if record else '' }}</textarea>
                    </div>
                </fieldset>
                
                <!-- Role-Based Responsibilities -->
                <fieldset class="form-section">
                    <legend>Role Assignments & Responsibilities</legend>
                    
                    <div class="responsibility-grid">
                        <!-- Videographer -->
                        <div class="responsibility-group">
                            <span><strong>Traditional Videographer</strong></span>
                            <textarea name="videographer_notes" class="form-textarea form-textarea-small" placeholder="Notes for videographer role...">{{ record.videographer_notes if record else '' }}</textarea>
                        </div>
                        
                        <!-- Photographer -->
                        <div class="responsibility-group">
                            <span><strong>Traditional Photographer</strong></span>
                            <textarea name="photographer_notes" class="form-textarea form-textarea-small" placeholder="Notes for photographer role...">{{ record.photographer_notes if record else '' }}</textarea>
                        </div>
                        
                        <!-- Candid Photographer -->
                        <div class="responsibility-group">
                            <span><strong>Candid Photographer</strong></span>
                            <textarea name="candid_notes" class="form-textarea form-textarea-small" placeholder="Notes for candid photographer role...">{{ record.candid_notes if record else '' }}</textarea>
                        </div>
                        
                        <!-- Cinematographer -->
                        <div class="responsibility-group">
                            <span><strong>Cinematographer</strong></span>
                            <textarea name="cinematographer_notes" class="form-textarea form-textarea-small" placeholder="Notes for cinematographer role...">{{ record.cinematographer_notes if record else '' }}</textarea>
                        </div>
                        
                        <!-- Drone Shooter -->
                        <div class="responsibility-group">
                            <span><strong>Drone Shooter</strong></span>
                            <textarea name="drone_notes" class="form-textarea form-textarea-small" placeholder="Notes for drone shooter role...">{{ record.drone_notes if record else '' }}</textarea>
                        </div>
                        
                        <!-- Pre-Wedding Shoot -->
                        <div class="responsibility-group">
                            <span><strong>Pre-Wedding Shoot</strong></span>
                            <textarea name="pre_wedding_notes" class="form-textarea form-textarea-small" placeholder="Notes for pre-wedding shoot...">{{ record.pre_wedding_notes if record else '' }}</textarea>
                        </div>
                    </div>
                </fieldset>
                
                <!-- Team Assignment -->
                <fieldset class="form-section">
                    <legend>Team Assignment</legend>
                    
                    <div class="form-group">
                        <label for="assigned_team">Assigned Team Members</label>
                        <input type="text" id="assigned_team" name="assigned_team" placeholder="e.g., John Doe, Sarah Smith, Mike Johnson" value="{{ record.assigned_team if record else '' }}" class="form-input">
                    </div>
                </fieldset>
                
                <!-- Additional Notes -->
                <fieldset class="form-section">
                    <legend>Additional Notes</legend>
                    
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" name="notes" class="form-textarea" placeholder="Add any additional notes or instructions...">{{ record.notes if record else '' }}</textarea>
                    </div>
                </fieldset>
                
                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">{% if record %}Update Checklist{% else %}Create Checklist{% endif %}</button>
                    <a href="/checklist" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .responsibility-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .responsibility-group {
        padding: 15px;
        background: #f9f9f9;
        border-radius: 8px;
    }
    
    .form-textarea-small {
        min-height: 80px;
        margin-top: 8px;
    }
</style>
{% endblock %}

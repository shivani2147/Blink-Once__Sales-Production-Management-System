{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>{% if is_edit %}Edit{% else %}Create{% endif %} Investment</h1>
        <p>Record investment for company growth</p>
    </div>

    <form method="post" class="data-form">
        <div class="form-section">
            <h3>Investment Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="date_input">Date</label>
                    <input type="date" id="date_input" name="date_input" required 
                           value="{% if investment %}{{ investment.date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
                <div class="form-group">
                    <label for="service">Service/Type</label>
                    <input type="text" id="service" name="service" required 
                           value="{% if investment %}{{ investment.service }}{% endif %}" placeholder="e.g., Equipment, Software, Training">
                </div>
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" step="0.01" required 
                           value="{% if investment %}{{ investment.amount }}{% endif %}">
                </div>
                <div class="form-group">
                    <label for="total_amount">Total Amount (₹)</label>
                    <input type="number" id="total_amount" name="total_amount" step="0.01" required 
                           value="{% if investment %}{{ investment.total_amount }}{% endif %}">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Additional Information</h3>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Add investment details...">{% if investment %}{{ investment.description }}{% endif %}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="/financial/investment/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{% if is_edit %}Update Investment{% else %}Create Investment{% endif %}</button>
        </div>
    </form>
</div>
{% endblock %}

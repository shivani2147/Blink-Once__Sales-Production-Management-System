{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h1>{% if is_edit %}Edit{% else %}Create{% endif %} Monthly Financial Report</h1>
        <p>Track revenue, expenses, and profit</p>
    </div>

    <form method="post" class="data-form">
        <div style="margin-bottom:1rem; font-weight:700; color:#333">Year: {{ current_year }}</div>
        <div class="form-section">
            <h3>Basic Information</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="month">Month</label>
                    <select id="month" name="month" required>
                        <option value="">Select Month</option>
                        {% for val, label in months %}
                        <option value="{{ val }}" {% if report and report.month.strftime('%Y-%m-01') == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="client_name">Client Name</label>
                    <input type="text" id="client_name" name="client_name" required 
                           value="{% if report %}{{ report.client_name }}{% endif %}" placeholder="Enter client name">
                </div>
                <div class="form-group">
                    <label for="event_type">Event Type</label>
                    <select id="event_type" name="event_type" required>
                        <option value="">Select Event Type</option>
                        {% for et in event_types %}
                        <option value="{{ et }}" {% if report and report.event_type == et %}selected{% endif %}>{{ et }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="event_date">Event Date</label>
                    <input type="date" id="event_date" name="event_date" required 
                           value="{% if report %}{{ report.event_date.strftime('%Y-%m-%d') }}{% endif %}">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Financial Details</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="total_amount">Total Amount (₹)</label>
                    <input type="number" id="total_amount" name="total_amount" step="0.01" required 
                           value="{% if report %}{{ report.total_amount }}{% endif %}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="paid_amount">Paid Amount (₹)</label>
                    <input type="number" id="paid_amount" name="paid_amount" step="0.01" required 
                           value="{% if report %}{{ report.paid_amount }}{% endif %}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="freelancer_amount">Freelancer Amount (₹)</label>
                    <input type="number" id="freelancer_amount" name="freelancer_amount" step="0.01" required 
                           value="{% if report %}{{ report.freelancer_amount }}{% endif %}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="expenses">Expenses (₹)</label>
                    <input type="number" id="expenses" name="expenses" step="0.01" required 
                           value="{% if report %}{{ report.expenses }}{% endif %}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="pending_amount">Pending Amount (₹)</label>
                    <input type="number" id="pending_amount" name="pending_amount" step="0.01" readonly 
                           value="{% if report %}{{ report.pending_amount }}{% endif %}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="profit">Profit (₹)</label>
                    <input type="number" id="profit" name="profit" step="0.01" readonly 
                           value="{% if report %}{{ report.profit }}{% endif %}" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Status Information</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="payment_status">Payment Status</label>
                    <select id="payment_status" name="payment_status" required>
                        <option value="">Select Payment Status</option>
                        <option value="Online" {% if report and report.payment_status == 'Online' %}selected{% endif %}>Online</option>
                        <option value="Cash" {% if report and report.payment_status == 'Cash' %}selected{% endif %}>Cash</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="work_status">Work Status</label>
                    <select id="work_status" name="work_status" required>
                        <option value="">Select Work Status</option>
                        <option value="Pending" {% if report and report.work_status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Done" {% if report and report.work_status == 'Done' %}selected{% endif %}>Done</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Additional Notes</h3>
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Add any additional notes...">{% if report %}{{ report.notes }}{% endif %}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="/financial/monthly/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{% if is_edit %}Update Report{% else %}Create Report{% endif %}</button>
        </div>
    </form>
</div>

<style>
.form-container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.form-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid #f0f0f0;
}

.form-header h1 {
    margin: 0 0 0.5rem 0;
    color: #333;
}

.form-header p {
    margin: 0;
    color: #666;
    font-size: 0.95rem;
}

.data-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.form-section {
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    padding: 1.5rem;
    background: #fafafa;
}

.form-section h3 {
    margin: 0 0 1.5rem 0;
    color: #333;
    font-size: 1.1rem;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #333;
    font-size: 0.95rem;
}

.form-group input,
.form-group select,
.form-group textarea {
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.3s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.form-group textarea {
    resize: vertical;
}

.negative {
    color: #e53e3e;
    font-weight: 700;
}

.form-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 2px solid #f0f0f0;
}

.btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
    background: #e0e0e0;
    color: #333;
}

.btn-secondary:hover {
    background: #d0d0d0;
}
</style>
<script>
    (function(){
        const totalEl = document.getElementById('total_amount');
        const paidEl = document.getElementById('paid_amount');
        const freelancerEl = document.getElementById('freelancer_amount');
        const expensesEl = document.getElementById('expenses');
        const pendingEl = document.getElementById('pending_amount');
        const profitEl = document.getElementById('profit');

        function toNumber(v){
            const n = parseFloat(v);
            return isNaN(n) ? 0 : n;
        }

        function recalc(){
            const total = toNumber(totalEl.value);
            const paid = toNumber(paidEl.value);
            const freelancer = toNumber(freelancerEl.value);
            const expenses = toNumber(expensesEl.value);

            const pending = total - paid;
            const profit = total - freelancer - expenses;

            if(pendingEl) pendingEl.value = pending.toFixed(2);
            if(profitEl) profitEl.value = profit.toFixed(2);
        }

        [totalEl, paidEl, freelancerEl, expensesEl].forEach(el => {
            if(!el) return;
            el.addEventListener('input', recalc);
            el.addEventListener('change', recalc);
        });

        // initial calc on load
        document.addEventListener('DOMContentLoaded', recalc);
        // also run immediately in case DOMContent already fired
        setTimeout(recalc, 50);
    })();
</script>
{% endblock %}
